<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — AI Agent Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #080810;
  --s1:          rgba(255,255,255,0.035);
  --s2:          rgba(255,255,255,0.065);
  --s3:          rgba(255,255,255,0.10);
  --b1:          rgba(255,255,255,0.07);
  --b2:          rgba(255,255,255,0.13);
  --t1:          rgba(255,255,255,0.95);
  --t2:          rgba(255,255,255,0.52);
  --t3:          rgba(255,255,255,0.27);
  --blue:        #2997ff;
  --blue-dim:    rgba(41,151,255,0.18);
  --blue-glow:   rgba(41,151,255,0.28);
  --green:       #30d158;
  --green-dim:   rgba(48,209,88,0.15);
  --orange:      #ff9f0a;
  --orange-dim:  rgba(255,159,10,0.15);
  --red:         #ff453a;
  --red-dim:     rgba(255,69,58,0.15);
  --purple:      #bf5af2;
  --purple-dim:  rgba(191,90,242,0.15);
  --teal:        #5ac8f5;
  --r-sm:   8px;
  --r-md:   14px;
  --r-lg:   20px;
  --r-xl:   28px;
  --font:   -apple-system,'Inter','Helvetica Neue',sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--font);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── AMBIENT ── */
.ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.orb {
  position: absolute; border-radius: 50%; filter: blur(130px); opacity: 0.10;
  animation: drift 20s ease-in-out infinite alternate;
}
.orb-1 { width: 700px; height: 700px; background: #2997ff; top: -15%; left: -10%; animation-delay: 0s; }
.orb-2 { width: 500px; height: 500px; background: #bf5af2; top: 50%; right: -10%; animation-delay: -8s; }
.orb-3 { width: 400px; height: 400px; background: #5ac8f5; bottom: -10%; left: 35%; animation-delay: -14s; }
@keyframes drift {
  0%   { transform: translate(0,0) scale(1); }
  50%  { transform: translate(25px,-35px) scale(1.04); }
  100% { transform: translate(-15px,20px) scale(0.97); }
}

/* ─── LAYOUT ── */
.shell { position: relative; z-index: 1; display: flex; height: 100vh; }

/* ─── SIDEBAR ── */
.sidebar {
  width: 64px;
  background: rgba(8,8,16,0.7);
  backdrop-filter: blur(40px) saturate(180%);
  border-right: 1px solid var(--b1);
  display: flex; flex-direction: column; align-items: center;
  padding: 18px 0; gap: 4px; flex-shrink: 0; z-index: 20;
}
.logo {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; margin-bottom: 18px;
  box-shadow: 0 0 20px var(--blue-glow);
}
.divider { width: 28px; height: 1px; background: var(--b1); margin: 6px 0; }
.nav-item {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--t3); font-size: 17px;
  transition: all 0.15s cubic-bezier(.25,.46,.45,.94);
  border: none; background: transparent; position: relative;
}
.nav-item:hover { background: var(--s2); color: var(--t2); }
.nav-item.on { background: var(--s3); color: var(--t1); box-shadow: inset 0 0 0 1px var(--b2); }
.tip {
  position: absolute; left: calc(100% + 10px); top: 50%; transform: translateY(-50%);
  background: rgba(28,28,36,0.96); backdrop-filter: blur(10px);
  border: 1px solid var(--b2); border-radius: var(--r-sm);
  padding: 4px 9px; font-size: 11.5px; font-weight: 500; color: var(--t1);
  white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.12s; z-index: 100;
}
.nav-item:hover .tip { opacity: 1; }
.nav-push { margin-top: auto; }

/* ─── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ─── TOPBAR ── */
.topbar {
  height: 48px;
  background: rgba(8,8,16,0.55);
  backdrop-filter: blur(40px) saturate(180%);
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; padding: 0 18px; gap: 10px;
  flex-shrink: 0;
}
.topbar-title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; flex: 1; }
.tb-clock { font-size: 11.5px; color: var(--t3); font-variant-numeric: tabular-nums; }
.tb-sep { width: 1px; height: 16px; background: var(--b1); }
.sysbar { display: flex; gap: 7px; align-items: center; }
.sysdot { width: 6px; height: 6px; border-radius: 50%; }
.sysdot.g { background: var(--green); box-shadow: 0 0 7px rgba(48,209,88,.5); animation: pulse 2.6s ease-in-out infinite; }
.sysdot.o { background: var(--orange); box-shadow: 0 0 7px rgba(255,159,10,.5); animation: pulse 2.6s ease-in-out infinite -0.9s; }
.sysdot.r { background: var(--red); box-shadow: 0 0 7px rgba(255,69,58,.5); animation: pulse 2.6s ease-in-out infinite -1.8s; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
.tb-btn {
  height: 26px; padding: 0 11px;
  background: var(--s2); border: 1px solid var(--b2); border-radius: 6px;
  color: var(--t2); font-family: var(--font); font-size: 11.5px; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.15s;
}
.tb-btn:hover { background: var(--s3); color: var(--t1); }
.tb-btn.primary { background: var(--blue); border-color: transparent; color: #fff; }
.tb-btn.primary:hover { background: #1a8cff; }
.search {
  height: 26px; width: 160px; padding: 0 9px;
  background: var(--s1); border: 1px solid var(--b1); border-radius: 6px;
  color: var(--t1); font-family: var(--font); font-size: 11.5px; outline: none; transition: all 0.2s;
}
.search::placeholder { color: var(--t3); }
.search:focus { border-color: var(--blue); background: var(--s2); box-shadow: 0 0 0 3px var(--blue-dim); }

/* ─── BODY GRID ── */
.body-grid {
  flex: 1; display: grid;
  grid-template-columns: 1fr 300px;
  grid-template-rows: auto 1fr;
  overflow: hidden;
}

/* ─── METRICS STRIP ── */
.metrics {
  grid-column: 1/-1;
  display: grid; grid-template-columns: repeat(5,1fr);
  gap: 1px; background: var(--b1); border-bottom: 1px solid var(--b1);
}
.m-card {
  background: rgba(8,8,16,.75); padding: 13px 16px;
  transition: background .15s; cursor: default;
}
.m-card:hover { background: rgba(255,255,255,.025); }
.m-lbl { font-size: 10.5px; color: var(--t3); text-transform: uppercase; letter-spacing: .4px; font-weight: 500; margin-bottom: 5px; }
.m-val { font-size: 24px; font-weight: 300; letter-spacing: -1px; line-height: 1; }
.m-val sup { font-size: 12px; font-weight: 400; color: var(--t3); margin-left: 2px; vertical-align: super; }
.m-delta { font-size: 10.5px; margin-top: 4px; }
.up   { color: var(--green); }
.down { color: var(--red); }
.neu  { color: var(--t3); }

/* ─── AGENT LIST ── */
.agent-list { overflow-y: auto; padding: 14px 12px; display: flex; flex-direction: column; gap: 7px; }
.agent-list::-webkit-scrollbar { width: 3px; }
.agent-list::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

.list-hdr { display: flex; align-items: center; justify-content: space-between; padding: 2px 4px 9px; }
.list-hdr-title { font-size: 12px; font-weight: 600; color: var(--t2); }
.pill-count {
  font-size: 10.5px; color: var(--t3);
  background: var(--s2); border: 1px solid var(--b1);
  padding: 1px 7px; border-radius: 20px;
}

/* ─── AGENT CARD ── */
.ac {
  background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r-md);
  padding: 13px; cursor: pointer; transition: all .2s cubic-bezier(.25,.46,.45,.94);
  position: relative; overflow: hidden;
}
.ac:hover { background: var(--s2); border-color: var(--b2); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,0,0,.25); }
.ac.sel { background: rgba(41,151,255,.055); border-color: rgba(41,151,255,.35); }
.ac.sel::before { content:''; position:absolute; inset:0; background: linear-gradient(135deg,rgba(41,151,255,.05),transparent); pointer-events:none; }
.ac-top { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
.ac-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.ac-info { flex: 1; min-width: 0; }
.ac-name { font-size: 12.5px; font-weight: 600; letter-spacing: -.1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ac-role { font-size: 10.5px; color: var(--t3); margin-top: 1px; }
.badge {
  font-size: 9.5px; font-weight: 600; padding: 2px 7px; border-radius: 20px; flex-shrink: 0;
  letter-spacing: .2px; text-transform: uppercase;
}
.b-run  { background: var(--green-dim);  color: var(--green);  border: 1px solid rgba(48,209,88,.25); }
.b-idle { background: var(--s2);         color: var(--t3);     border: 1px solid var(--b1); }
.b-que  { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(255,159,10,.25); }
.b-err  { background: var(--red-dim);    color: var(--red);    border: 1px solid rgba(255,69,58,.25); }
.b-pau  { background: var(--blue-dim);   color: var(--blue);   border: 1px solid rgba(41,151,255,.25); }

.ac-task { font-size: 11px; color: var(--t2); line-height: 1.5; margin-bottom: 9px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.ac-foot { display: flex; align-items: center; gap: 8px; }
.prog-track { flex: 1; height: 2.5px; background: var(--s3); border-radius: 2px; overflow: hidden; }
.prog-bar { height: 100%; border-radius: 2px; transition: width 1s ease; }
.ac-time { font-size: 10px; color: var(--t3); flex-shrink: 0; }

/* ─── DETAIL PANEL ── */
.detail {
  border-left: 1px solid var(--b1);
  background: rgba(8,8,16,.65);
  backdrop-filter: blur(30px) saturate(160%);
  display: flex; flex-direction: column; overflow: hidden;
}
.d-hdr { padding: 14px 16px 11px; border-bottom: 1px solid var(--b1); flex-shrink: 0; }
.d-agent-hdr { display: flex; align-items: center; gap: 11px; margin-bottom: 12px; }
.d-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.d-name { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
.d-role { font-size: 11px; color: var(--t3); margin-top: 2px; }
.d-tabs { display: flex; gap: 2px; }
.d-tab {
  padding: 4px 11px; border-radius: 6px;
  font-size: 11.5px; font-weight: 500; color: var(--t3);
  cursor: pointer; transition: all .15s; border: none; background: transparent;
}
.d-tab.on { background: var(--s3); color: var(--t1); }
.d-tab:hover:not(.on) { color: var(--t2); }

.d-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
.d-body::-webkit-scrollbar { width: 3px; }
.d-body::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

/* Stat tiles */
.tile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 14px; }
.tile {
  background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r-sm);
  padding: 9px 11px;
}
.tile-lbl { font-size: 9.5px; color: var(--t3); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 3px; }
.tile-val { font-size: 18px; font-weight: 300; letter-spacing: -.5px; }

/* Sub header */
.sh { font-size: 10.5px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: .5px; margin: 12px 0 7px; }

/* Log entries */
.log { display: flex; flex-direction: column; gap: 0; }
.le {
  display: flex; gap: 9px; padding: 6px 0;
  border-bottom: 1px solid var(--b1); font-size: 11px;
}
.le:last-child { border-bottom: none; }
.le-t { color: var(--t3); font-size: 10px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; font-variant-numeric: tabular-nums; }
.le-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.le-msg { color: var(--t2); line-height: 1.5; }
.le-msg b { color: var(--t1); font-weight: 500; }

/* Tool calls */
.tc-card {
  background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r-sm);
  padding: 9px 11px; margin-bottom: 7px;
}
.tc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
.tc-name { font-size: 11.5px; font-weight: 600; color: var(--blue); font-family: 'SF Mono','Monaco','Menlo',monospace; }
.tc-ms { font-size: 9.5px; color: var(--t3); }
.tc-args { font-size: 10.5px; color: var(--t3); font-family: 'SF Mono','Monaco','Menlo',monospace; line-height: 1.6; }

/* Terminal */
.term {
  background: rgba(0,0,0,.5); border: 1px solid var(--b1); border-radius: var(--r-md);
  overflow: hidden; margin-bottom: 7px;
}
.term-bar {
  background: var(--s2); padding: 6px 11px;
  display: flex; align-items: center; gap: 5px; border-bottom: 1px solid var(--b1);
}
.tm-dot { width: 9px; height: 9px; border-radius: 50%; }
.tm-r{background:#ff5f57}.tm-y{background:#febc2e}.tm-g{background:#28c840}
.term-lbl { font-size: 10.5px; color: var(--t3); margin-left: 5px; }
.term-body {
  padding: 10px 12px;
  font-family: 'SF Mono','Monaco','Menlo',monospace;
  font-size: 10.5px; line-height: 1.85; color: var(--t2);
  max-height: 130px; overflow-y: auto;
}
.term-body::-webkit-scrollbar { width: 3px; }
.term-body::-webkit-scrollbar-thumb { background: var(--b2); }
.tg{color:var(--green)}.tb{color:var(--blue)}.to{color:var(--orange)}.tr{color:var(--red)}.td{color:var(--t3)}
.cursor::after { content:'▋'; animation: blink 1.1s step-end infinite; }
@keyframes blink { 50%{opacity:0} }

/* Spark */
.spark { height: 34px; width: 100%; margin: 3px 0 10px; }

/* Pipeline */
.pipe-node {
  background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r-sm);
  padding: 7px 11px; display: flex; align-items: center; gap: 8px;
  margin-bottom: 5px; font-size: 11.5px;
}
.pipe-icon { font-size: 13px; flex-shrink: 0; }
.pipe-lbl { flex: 1; }
.pipe-status { font-size: 10px; color: var(--t3); }
.pipe-connector {
  width: 1px; height: 14px; background: var(--b2); margin: 0 auto 5px;
}

/* Command bar */
.cmd-bar {
  border-top: 1px solid var(--b1); padding: 9px 13px;
  display: flex; gap: 6px; flex-shrink: 0;
}
.cmd-inp {
  flex: 1; background: var(--s1); border: 1px solid var(--b1); border-radius: var(--r-sm);
  padding: 7px 11px; font-family: var(--font); font-size: 11.5px; color: var(--t1); outline: none; transition: all .2s;
}
.cmd-inp::placeholder { color: var(--t3); }
.cmd-inp:focus { border-color: var(--blue); background: var(--s2); box-shadow: 0 0 0 3px var(--blue-dim); }
.cmd-send {
  width: 32px; height: 32px; background: var(--blue); border: none; border-radius: var(--r-sm);
  color: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.cmd-send:hover { background: #1a8cff; transform: scale(1.06); }

/* Toast */
.toast-wrap { position: fixed; bottom: 18px; left: 78px; z-index: 300; display: flex; flex-direction: column; gap: 7px; }
.toast {
  background: rgba(26,26,36,.97); backdrop-filter: blur(20px);
  border: 1px solid var(--b2); border-radius: var(--r-md);
  padding: 10px 13px; display: flex; align-items: flex-start; gap: 9px;
  box-shadow: 0 8px 30px rgba(0,0,0,.45); min-width: 240px; max-width: 320px;
  animation: tIn .3s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes tIn { from{opacity:0;transform:translateY(8px) scale(.96)} to{opacity:1;transform:none} }
.toast.out { animation: tOut .22s ease forwards; }
@keyframes tOut { to{opacity:0;transform:translateY(4px) scale(.97)} }
.toast-ico { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
.toast-text { flex: 1; }
.toast-title { font-size: 12.5px; font-weight: 600; color: var(--t1); }
.toast-sub { font-size: 10.5px; color: var(--t3); margin-top: 1px; }

/* Context menu */
.ctx-menu {
  position: fixed; z-index: 500;
  background: rgba(28,28,36,.97); backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--b2); border-radius: var(--r-md);
  padding: 5px; min-width: 180px;
  box-shadow: 0 12px 40px rgba(0,0,0,.55);
  animation: ctxIn .15s ease forwards;
}
@keyframes ctxIn { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:none} }
.ctx-item {
  padding: 6px 10px; border-radius: 6px; font-size: 12px; color: var(--t1);
  cursor: pointer; display: flex; align-items: center; gap: 9px; transition: background .1s;
}
.ctx-item:hover { background: var(--s3); }
.ctx-item.danger { color: var(--red); }
.ctx-sep { height: 1px; background: var(--b1); margin: 3px 0; }
.ctx-icon { font-size: 13px; width: 16px; text-align: center; }

/* Scrollbar global */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ambient glow -->
<div class="ambient">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="shell">

  <!-- ── SIDEBAR ── -->
  <nav class="sidebar">
    <div class="logo">⬡</div>

    <button class="nav-item on" data-view="agents">
      <span>⊞</span><span class="tip">Agents</span>
    </button>
    <button class="nav-item" data-view="pipelines">
      <span>⬡</span><span class="tip">Pipelines</span>
    </button>
    <button class="nav-item" data-view="tasks">
      <span>◈</span><span class="tip">Tasks</span>
    </button>
    <button class="nav-item" data-view="memory">
      <span>⬗</span><span class="tip">Memory</span>
    </button>
    <button class="nav-item" data-view="tools">
      <span>⌧</span><span class="tip">Tools</span>
    </button>
    <div class="divider"></div>
    <button class="nav-item" data-view="logs">
      <span>≡</span><span class="tip">Logs</span>
    </button>
    <button class="nav-item" data-view="metrics">
      <span>◌</span><span class="tip">Metrics</span>
    </button>
    <div class="divider nav-push"></div>
    <button class="nav-item" data-view="settings">
      <span>⚙</span><span class="tip">Settings</span>
    </button>
  </nav>

  <!-- ── MAIN ── -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <span class="topbar-title">Nexus Command Center</span>
      <span class="tb-clock" id="clock">--:--:--</span>
      <div class="tb-sep"></div>
      <div class="sysbar">
        <div class="sysdot g" title="System healthy"></div>
        <div class="sysdot o" title="1 agent queued"></div>
        <div class="sysdot r" title="0 errors" style="opacity:.3"></div>
      </div>
      <div class="tb-sep"></div>
      <input class="search" placeholder="⌕  Search agents…" id="search-inp" oninput="filterAgents(this.value)">
      <button class="tb-btn" onclick="pauseAll()">⏸ Pause All</button>
      <button class="tb-btn primary" onclick="deployAgent()">＋ Deploy Agent</button>
    </div>

    <!-- BODY -->
    <div class="body-grid">

      <!-- METRICS STRIP -->
      <div class="metrics">
        <div class="m-card">
          <div class="m-lbl">Active Agents</div>
          <div class="m-val" id="m-active">–</div>
          <div class="m-delta up" id="m-active-d">↑ 2 since last hour</div>
        </div>
        <div class="m-card">
          <div class="m-lbl">Tasks / min</div>
          <div class="m-val" id="m-tpm">–<sup>tpm</sup></div>
          <div class="m-delta up" id="m-tpm-d">↑ 12%</div>
        </div>
        <div class="m-card">
          <div class="m-lbl">Token Usage</div>
          <div class="m-val" id="m-tokens">–<sup>k</sup></div>
          <div class="m-delta neu" id="m-tokens-d">– within budget</div>
        </div>
        <div class="m-card">
          <div class="m-lbl">Avg Latency</div>
          <div class="m-val" id="m-lat">–<sup>ms</sup></div>
          <div class="m-delta down" id="m-lat-d">↑ 4ms</div>
        </div>
        <div class="m-card">
          <div class="m-lbl">Success Rate</div>

function renderAgentList(agents) {
  const list = document.getElementById('agent-list');

  agents.forEach(agent => {

    card.className = 'ac' + (agent.id === selectedAgent.id ? ' sel' : '');

    card.innerHTML = `

        <div class="ac-icon" style="background:${agent.color}">${agent.icon}</div>
        <div class="ac-info">
          <div class="ac-name">${agent.name}</div>
          <div class="ac-role">${agent.role}</div>
        </div>
        <span class="badge ${STATUS_BADGE[agent.status]}">${STATUS_LABEL[agent.status]}</span>

      <div class="ac-task">${agent.task}</div>
      <div class="ac-foot">

        </div>
        <span class="ac-time">${agent.elapsed}</span>

}

function filterAgents(q) {
  const lower = q.toLowerCase();
  const filtered = AGENTS.filter(a =>
    a.name.toLowerCase().includes(lower) ||
    a.role.toLowerCase().includes(lower) ||
    a.task.toLowerCase().includes(lower)
  );
  renderAgentList(filtered);
}

function selectAgent(id) {
  selectedAgent = AGENTS.find(a=>a.id===id);
  document.querySelectorAll('.ac').forEach(el=>el.classList.toggle('sel', el.dataset.id===id));
  renderDetail(selectedAgent, activeTab);
}

      <div class="tile"><div class="tile-lbl">Avg Latency</div><div class="tile-val">${a.latency}<span style="font-size:12px;color:var(--t3)">ms</span></div></div>
      <div class="tile"><div class="tile-lbl">Success Rate</div><div class="tile-val">${a.success}<span style="font-size:12px;color:var(--t3)">%</span></div></div>
    </div>
    <div class="sh">Activity</div>
    <svg class="spark" viewBox="0 0 200 34" preserveAspectRatio="none">
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${colorCls}" stop-opacity=".25"/>
          <stop offset="100%" stop-color="${colorCls}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${spark.area}" fill="url(#sg)"/>
      <path d="${spark.line}" fill="none" stroke="${colorCls}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="sh">Current Task</div>
    <div style="font-size:11.5px;color:var(--t2);line-height:1.65;margin-bottom:14px">${a.task}</div>
    <div class="sh">Terminal Output</div>
    <div class="term">
      <div class="term-bar"><div class="tm-dot tm-r"></div><div class="tm-dot tm-y"></div><div class="tm-dot tm-g"></div><span class="term-lbl">${a.name} · stdout</span></div>
      <div class="term-body">${termLines(a)}</div>
    </div>`;
}

function renderLogs(a) {
  if (!a.logs.length) return '<div style="color:var(--t3);font-size:12px;padding:20px 0;text-align:center">No logs yet</div>';
  return '<div class="log">' + [...a.logs].reverse().map(l=>`
    <div class="le">
      <span class="le-t">${l.t}</span>
      <div class="le-dot" style="background:${l.c||'var(--t3)'}"></div>
      <span class="le-msg">${l.m}</span>

}

function renderTools(a) {
  if (!a.tools.length) return '<div style="color:var(--t3);font-size:12px;padding:20px 0;text-align:center">No tool calls recorded</div>';
  return `<div class="sh">Recent Tool Calls</div>` + a.tools.map(t=>`

}

function renderPipeline(a) {
  return `<div class="sh">Execution Pipeline</div>` +
    a.pipeline.map((step, i) => {
      const done  = i < a.pipelineStep;
      const cur   = i === a.pipelineStep;
      const color = done ? 'var(--green)' : cur ? 'var(--blue)' : 'var(--t3)';
      const bg    = done ? 'var(--green-dim)' : cur ? 'var(--blue-dim)' : 'var(--s1)';
      const icon  = done ? '✓' : cur ? '▶' : '○';
      const connector = i < a.pipeline.length-1 ? `<div class="pipe-connector"></div>` : '';
      return `
        <div class="pipe-node" style="background:${bg};border-color:${cur?'rgba(41,151,255,.3)':'var(--b1)'}">
          <span class="pipe-icon" style="color:${color}">${icon}</span>
          <span class="pipe-lbl" style="color:${done||cur?'var(--t1)':'var(--t3)'}">${step}</span>
          ${cur ? '<span class="pipe-status">In progress…</span>' : done ? '<span class="pipe-status" style="color:var(--green)">Done</span>' : ''}
        </div>
        ${connector}`;
    }).join('');
}

/* ══════════════════════════════════════════════════
   SPARK SVG HELPER
══════════════════════════════════════════════════ */
function sparkPath(data) {
  const W=200, H=34, n=data.length;
  const max=Math.max(...data,1);
  const pts = data.map((v,i)=>[i*(W/(n-1)), H-2-((v/max)*(H-4))]);
  const lineD = 'M'+pts.map(p=>p.join(',')).join('L');
  const areaD = lineD + `L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`;
  return { line: lineD, area: areaD };
}

/* ══════════════════════════════════════════════════

══════════════════════════════════════════════════ */
function termLines(a) {
  const map = {running:'<span class="tg">●</span> RUNNING', idle:'<span class="tb">◆</span> IDLE', queued:'<span class="to">◆</span> QUEUED', error:'<span class="tr">✗</span> ERROR', paused:'<span class="td">‖</span> PAUSED'};
  const sample = {
    running:`<span class="tg">[OK]</span> Heartbeat received\n<span class="tb">[INFO]</span> Pending tool_call: merge_context\n<span class="td">[TRACE]</span> ctx_window: 42,814 / 200,000 tokens\n<span class="to">[WAIT]</span> Awaiting response from downstream agent<span class="cursor"></span>`,
    idle:`<span class="tg">[OK]</span> Last task completed successfully\n<span class="td">[TRACE]</span> Agent standing by — no tasks in queue\n<span class="tb">[INFO]</span> Memory retention: active<span class="cursor"></span>`,
    queued:`<span class="to">[WAIT]</span> Task queued — waiting for context\n<span class="td">[TRACE]</span> Dependencies: [Archon merge_context]\n<span class="tb">[INFO]</span> Estimated start: ~2m 30s<span class="cursor"></span>`,
    error:`<span class="tr">[ERROR]</span> Tool call timeout after 3 retries\n<span class="tr">[FATAL]</span> Unrecoverable — agent halted\n<span class="td">[TRACE]</span> Last exit code: ETIMEOUT\n<span class="to">[WARN]</span> Manual intervention required<span class="cursor"></span>`,
    paused:`<span class="to">[PAUSED]</span> Agent suspended by operator\n<span class="td">[TRACE]</span> State saved to checkpoint #7<span class="cursor"></span>`,
  };
  return `<span class="td">$ nexus agent inspect ${a.id}</span>\n${map[a.status]}\n${sample[a.status]||''}`;
}

    <div class="ctx-item" onclick="ctxAction('duplicate')"><span class="ctx-icon">⧉</span> Duplicate Config</div>
    <div class="ctx-item" onclick="ctxAction('logs')"><span class="ctx-icon">≡</span> View Full Logs</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" onclick="ctxAction('terminate')"><span class="ctx-icon">✕</span> Terminate Agent</div>`;
  menu.style.display = 'block';
  menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
  menu.style.top  = Math.min(e.clientY, window.innerHeight - 260) + 'px';
}
function hideCtx() { document.getElementById('ctx-menu').style.display='none'; }
function ctxAction(action) {
  hideCtx();
  const a = ctxTarget;
  const actions = {
    inspect:   [`🔍 Inspecting ${a.name}`, `Switching to detail view`, ()=>selectAgent(a.id)],
    restart:   [`↺ Restarting ${a.name}`, `Agent will restart in 2s`, ()=>{ a.status='running'; a.progress=0; renderAgentList(AGENTS); if(selectedAgent.id===a.id) renderDetail(a,activeTab); }],
    pause:     [`⏸ Paused ${a.name}`, `Agent suspended`, ()=>{ a.status='paused'; renderAgentList(AGENTS); if(selectedAgent.id===a.id) renderDetail(a,activeTab); }],
    duplicate: [`⧉ Config copied`, `Duplicated ${a.name} configuration`, null],
    logs:      [`≡ Logs for ${a.name}`, `Switching to logs tab`, ()=>{ selectAgent(a.id); activeTab='logs'; document.querySelectorAll('.d-tab').forEach(b=>b.classList.toggle('on',b.dataset.tab==='logs')); renderDetail(a,'logs'); }],
    terminate: [`✕ Terminating ${a.name}`, `Agent will be stopped`, ()=>{ a.status='idle'; a.progress=0; renderAgentList(AGENTS); if(selectedAgent.id===a.id) renderDetail(a,activeTab); }],
  };
  const [title, sub, fn] = actions[action]||['Done','',null];
  toast(title, sub, 3000);
  if(fn) setTimeout(fn, 300);
}

/* ══════════════════════════════════════════════════
   TOPBAR ACTIONS
══════════════════════════════════════════════════ */
function pauseAll() {
  paused = !paused;
  AGENTS.forEach(a=>{ if(a.status==='running') a.status = paused ? 'paused' : 'running'; });
  renderAgentList(AGENTS);
  renderDetail(selectedAgent, activeTab);
  toast(paused ? '⏸ All agents paused' : '▶ All agents resumed', paused ? 'Pipeline execution suspended' : 'Resuming all pipelines', 3000);
}

function deployAgent() {
  toast('⬡ Deploy Agent', 'Agent deployment wizard coming soon', 3000);
}

/* ══════════════════════════════════════════════════
   COMMAND BAR
══════════════════════════════════════════════════ */
function cmdKeydown(e) { if(e.key==='Enter') sendCmd(); }
function sendCmd() {
  const inp = document.getElementById('cmd-inp');
  const val = inp.value.trim();
  if(!val) return;
  toast(`↑ Command sent to ${selectedAgent.name}`, val.length > 48 ? val.slice(0,48)+'…' : val, 3000);
  inp.value = '';
}

/* ══════════════════════════════════════════════════
   LIVE TICK (simulate agent progress)
══════════════════════════════════════════════════ */
function tickLive() {
  if(paused) return;
  AGENTS.forEach(a => {
    if(a.status === 'running') {
      a.progress = Math.min(a.progress + (Math.random()*3 - 0.5), 99);
      a.tokens   += Math.round(Math.random() * 400 + 100);
      a.calls    += Math.round(Math.random() * 3);
      a.sparkData.push(a.progress);
      if(a.sparkData.length > 10) a.sparkData.shift();
    }
  });
  renderAgentList(AGENTS);
  renderMetrics();
  if(document.querySelector('.d-tab.on')?.dataset.tab === 'overview') {
    renderDetail(selectedAgent, 'overview');
  }
}

/* ══════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════ */
function toast(title, sub, dur=3000) {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span class="toast-title">${title}</span>${sub?`<div class="toast-sub">${sub}</div>`:''}`;
  wrap.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(()=>el.remove(), 250); }, dur);
}

/* ── START ── */
init();
</script>
</body>
</html>
